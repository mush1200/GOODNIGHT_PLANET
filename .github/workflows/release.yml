name: release

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          # Not stored in repo — set in GitHub → Settings → Secrets → CI_POSTGRES_PASSWORD
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: goodnight_planet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set CI DATABASE_URL
        env:
          CI_POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        run: |
          if [ -z "$CI_POSTGRES_PASSWORD" ]; then
            echo "::error::Set repository secret CI_POSTGRES_PASSWORD (see .github/CI_SETUP.md)"
            exit 1
          fi
          echo "DATABASE_URL=postgresql://postgres:${CI_POSTGRES_PASSWORD}@localhost:5432/goodnight_planet_test" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
        working-directory: apps/api
      - run: npm run migrate
        working-directory: apps/api
      - run: npm run build
        working-directory: apps/api
      - run: npm run test
        working-directory: apps/api

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
        working-directory: apps/mobile
      - run: npm run test
        working-directory: apps/mobile

  contract-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
        working-directory: apps/mobile
      - run: npx vitest run src/openapiContract.test.ts
        working-directory: apps/mobile
